apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-product-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-product-app
  template:
    metadata:
      labels:
        app: enterprise-product-app
    spec:
      containers:
        - name: enterprise-product-app
          image: 484826611947.dkr.ecr.us-east-1.amazonaws.com/enterprise-product-app:5
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: enterprise-product-config
                  key: APP_NAME
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-product-config
                  key: ENVIRONMENT
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enterprise-product-secret
                  key: APP_PASSWORD